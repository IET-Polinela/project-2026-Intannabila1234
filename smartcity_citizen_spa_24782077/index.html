<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCity_Apuh - Citizen Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top left, #4a1217 0%, #2d0b0e 38%, #1a0305 100%);
            color: #f8f9fa;
            min-height: 100vh;
        }
        .card-custom {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
        }
        .text-maroon-light {
            color: #ff8a95;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold text-uppercase"><i class="fa-solid fa-city text-maroon-light me-2"></i>SmartCity_Apuh</span>
        </div>
    </nav>

    <div class="container py-5">
        <div class="p-5 mb-4 card-custom text-center">
            <h1 class="display-5 fw-bold text-maroon-light">Selamat Datang di SmartCity_Apuh</h1>
            <p class="col-md-8 mx-auto fs-5 text-muted">Portal Pengaduan Warga dan Pemantauan Layanan Masyarakat Kota secara Real-Time.</p>
        </div>

        <div class="card card-custom p-4 mt-4">
            <h4 class="fw-bold mb-3 text-maroon-light"><i class="fa-solid fa-rss me-2"></i>Live Feed Laporan Warga</h4>
            <div id="loadingStatus" class="text-info small"><i class="fa-solid fa-spinner fa-spin me-1"></i> Menghubungi backend server kampus...</div>
            <ul id="reportFeedList" class="list-group list-group-flush bg-transparent mt-2"></ul>
        </div>
    </div>

    <script>
        // Memanggil API Gunicorn kamu yang berjalan di port 9009 / proxy Nginx 8009
        const BACKEND_URL = 'http://103.151.63.87:8009/dashboard/api/reports/'; 

        fetch(BACKEND_URL)
            .then(response => response.json())
            .then(data => {
                document.getElementById('loadingStatus').style.display = 'none';
                const listContainer = document.getElementById('reportFeedList');
                if(data.length === 0) {
                    listContainer.innerHTML = '<li class="list-group-item bg-transparent text-muted text-center border-0">Belum ada data laporan.</li>';
                    return;
                }
                data.slice(0, 5).forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item bg-transparent text-white border-secondary px-0 d-flex justify-content-between align-items-center';
                    li.innerHTML = `<div><strong class="text-warning">${item.title}</strong> - <span class="text-muted small">${item.location}</span></div><span class="badge bg-danger rounded-pill">${item.category}</span>`;
                    listContainer.appendChild(li);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('loadingStatus').innerHTML = '<span class="text-danger"><i class="fa-solid fa-circle-xmark me-1"></i> Gagal memuat data backend.</span>';
            });
    </script>
</body>
</html>
