<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart City - Portal Warga</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; }
    .page { display: none; padding: 20px; }
    .page.active { display: block; }
    #loginPage { max-width: 400px; margin: 80px auto; background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
    #loginPage h2 { margin-bottom: 24px; text-align: center; color: #1a73e8; }
    #loginForm .field { margin-bottom: 16px; }
    #loginForm label { display: block; margin-bottom: 6px; font-weight: bold; }
    #loginForm input { width: 100%; padding: 10px 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    #loginForm button[type="submit"] { width: 100%; padding: 12px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; margin-top: 8px; }
    #loginError { color: red; margin-top: 10px; font-size: 13px; text-align: center; }
    #dashboardPage { max-width: 900px; margin: 0 auto; padding: 20px; }
    .topbar { background: #1a73e8; color: #fff; padding: 16px 24px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .topbar h1 { font-size: 20px; }
    .topbar button { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.5); padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    .actions { margin-bottom: 20px; }
    #btnBukaModal { background: #34a853; color: #fff; border: none; padding: 11px 22px; border-radius: 6px; font-size: 14px; cursor: pointer; }
    #reportList { background: #fff; border-radius: 8px; padding: 20px; }
    #reportModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; justify-content: center; align-items: center; }
    #reportModal.visible { display: flex; }
    .modal-box { background: #fff; border-radius: 10px; padding: 32px; width: 480px; max-width: 95%; }
    .modal-box h3 { margin-bottom: 20px; color: #1a73e8; }
    .modal-box .field { margin-bottom: 14px; }
    .modal-box label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
    .modal-box input, .modal-box select, .modal-box textarea { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    .modal-box textarea { resize: vertical; min-height: 80px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .modal-actions button { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; }
    #btnTutupModal { background: #e0e0e0; color: #333; }
    #btnKirimLaporan { background: #1a73e8; color: #fff; }
  </style>
</head>
<body>
  <div id="loginPage" class="page">
    <h2>Portal Warga Smart City</h2>
    <form id="loginForm" autocomplete="off">
      <div class="field"><label for="loginUsername">Username</label><input type="text" id="loginUsername" name="username" placeholder="Masukkan username" required /></div>
      <div class="field"><label for="loginPassword">Password</label><input type="password" id="loginPassword" name="password" placeholder="Masukkan password" required /></div>
      <button type="submit">Masuk</button>
      <div id="loginError"></div>
    </form>
  </div>
  <div id="dashboardPage" class="page">
    <div class="topbar"><h1>Dashboard Warga</h1><div><span id="welcomeUser" style="margin-right:12px;font-size:14px;"></span><button id="btnLogout">Logout</button></div></div>
    <div class="actions"><button id="btnBukaModal">+ Buat Laporan</button></div>
    <div id="reportList"><h3>Laporan Saya</h3><div id="reportItems"><p>Memuat laporan...</p></div></div>
  </div>
  <div id="reportModal" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h3>Buat Laporan Baru</h3>
      <form id="reportForm">
        <div class="field"><label for="reportTitle">Judul Laporan</label><input type="text" id="reportTitle" placeholder="Masukkan judul laporan" required /></div>
        <div class="field"><label for="reportCategory">Kategori</label><select id="reportCategory"><option value="">-- Pilih Kategori --</option><option value="infrastruktur">Infrastruktur</option><option value="lingkungan">Lingkungan</option><option value="keamanan">Keamanan</option><option value="lainnya">Lainnya</option></select></div>
        <div class="field"><label for="reportDescription">Deskripsi</label><textarea id="reportDescription" placeholder="Jelaskan masalah..."></textarea></div>
        <div class="modal-actions"><button type="button" id="btnTutupModal">Batal</button><button type="submit" id="btnKirimLaporan">Kirim Laporan</button></div>
      </form>
    </div>
  </div>
  <script>
    const API_BASE = 'http://localhost:8000';
    const getToken = () => localStorage.getItem('access_token');
    const getRefresh = () => localStorage.getItem('refresh_token');
    const getUser = () => localStorage.getItem('username');
    function clearAuth() { localStorage.removeItem('access_token'); localStorage.removeItem('refresh_token'); localStorage.removeItem('username'); }
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function navigateTo(hash) { window.location.hash = hash; }
    function handleRoute() {
      const hash = window.location.hash || '#login';
      if (hash === '#dashboard') {
        if (!getToken()) { navigateTo('#login'); return; }
        showPage('dashboardPage'); loadDashboard();
      } else { navigateTo('#login'); showPage('loginPage'); }
    }
    window.addEventListener('hashchange', handleRoute);
    window.addEventListener('load', handleRoute);
    async function apiFetch(url, options = {}) {
      const fullUrl = url.startsWith('http') ? url : API_BASE + url;
      const token = getToken();
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (token) headers['Authorization'] = 'Bearer ' + token;
      let res = await fetch(fullUrl, { ...options, headers });
      if (res.status === 401) {
        const refreshToken = getRefresh();
        if (refreshToken) {
          try {
            const rr = await fetch(API_BASE + '/api/token/refresh/', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refresh: refreshToken }) });
            if (rr.ok) { const d = await rr.json(); localStorage.setItem('access_token', d.access); headers['Authorization'] = 'Bearer ' + d.access; return await fetch(fullUrl, { ...options, headers }); }
          } catch (_) {}
        }
        clearAuth(); navigateTo('#login'); return res;
      }
      return res;
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';
      try {
        const res = await fetch(API_BASE + '/api/token/', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        if (res.ok) { const d = await res.json(); localStorage.setItem('access_token', d.access); localStorage.setItem('refresh_token', d.refresh); localStorage.setItem('username', username); navigateTo('#dashboard'); }
        else { errEl.textContent = 'Username atau password salah.'; }
      } catch (_) { errEl.textContent = 'Gagal terhubung ke server.'; }
    });
    document.getElementById('btnLogout').addEventListener('click', () => { clearAuth(); navigateTo('#login'); });
    async function loadDashboard() {
      const user = getUser(); if (user) document.getElementById('welcomeUser').textContent = 'Halo, ' + user;
      const itemsEl = document.getElementById('reportItems');
      itemsEl.innerHTML = '<p>Memuat laporan...</p>';
      try {
        const res = await apiFetch('/api/reports/'); if (!res) return;
        if (res.ok) { const data = await res.json(); const results = data.results || data; itemsEl.innerHTML = results.length ? results.map(r => '<div><strong>' + (r.title||'-') + '</strong></div>').join('') : '<p>Belum ada laporan.</p>'; }
        else { itemsEl.innerHTML = '<p style="color:red">Gagal memuat laporan.</p>'; }
      } catch (_) { itemsEl.innerHTML = '<p style="color:red">Tidak dapat terhubung.</p>'; }
    }
    const modal = document.getElementById('reportModal');
    document.getElementById('btnBukaModal').addEventListener('click', () => modal.classList.add('visible'));
    document.getElementById('btnTutupModal').addEventListener('click', () => modal.classList.remove('visible'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('visible'); });
    document.getElementById('reportForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await apiFetch('/api/reports/', { method: 'POST', body: JSON.stringify({ title: document.getElementById('reportTitle').value, category: document.getElementById('reportCategory').value, description: document.getElementById('reportDescription').value }) });
        if (res && res.ok) { modal.classList.remove('visible'); document.getElementById('reportForm').reset(); loadDashboard(); }
        else { alert('Gagal mengirim laporan.'); }
      } catch (_) { alert('Tidak dapat terhubung ke server.'); }
    });
  </script>
</body>
</html>
