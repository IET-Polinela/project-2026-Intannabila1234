<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart City Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body class="spa-bg">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm position-sticky top-0 start-0 end-0 zindex-sticky" style="background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(16px);">
      <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#dashboard">
          <span class="badge bg-info text-dark rounded-pill p-2"><i class="bi bi-building-fill"></i></span>
          <span>Smart City Portal</span>
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation" id="navbarToggler">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarCollapse">
          <div class="ms-auto d-flex align-items-center gap-2 d-none" id="dashboardActions">
            <button id="navNewReport" class="btn btn-primary btn-sm px-4">Laporan Baru</button>
            <button id="navMyReports" class="btn btn-outline-light btn-sm px-4">Laporan Saya</button>
            <button id="navLogout" class="btn btn-danger btn-sm px-4">Logout</button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container-fluid px-4 py-5" id="app"></main>

    <!-- Load JS as ES modules -->
    <script type="module" src="js/main.js?v=5"></script>
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
