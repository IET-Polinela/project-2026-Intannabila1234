{% extends 'base.html' %}

{% block content %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="/">Home</a></li>
    <li class="breadcrumb-item"><a href="{% url 'main_app:reports_list' %}">Reports</a></li>
    <li class="breadcrumb-item active">Update Report</li>
  </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4><i class="bi bi-pencil"></i> Edit Laporan</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_title" class="form-label">Judul Laporan</label>
                        <input type="text" name="title" id="id_title" class="form-control" value="{{ report.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_location" class="form-label">Lokasi</label>
                        <input type="text" name="location" id="id_location" class="form-control" value="{{ report.location }}" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Update</button>
                        <a href="{% url 'main_app:reports_list' %}" class="btn btn-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
