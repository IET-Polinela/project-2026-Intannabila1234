<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}IET City{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ============================================================
         * SPLASH SCREEN INTRO CONFIGURATION
         * ============================================================ */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1a0508; /* Warna Dasar Maroon Gelap */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999; /* Berada di atas elemen apapun */
            transition: opacity 1s ease-out, visibility 1s;
        }

        .splash-content {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Tulisan Animasi Glowing */
        .splash-title {
            color: #ff3344; /* Merah Neon */
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 12px;
            text-shadow: 0 0 25px rgba(255, 51, 68, 0.7);
            animation: pulseGlow 2s infinite ease-in-out;
        }

        .splash-subtitle {
            color: #ff99aa;
            font-size: 1.25rem;
            opacity: 0.8;
            letter-spacing: 1.5px;
            font-weight: 300;
        }

        /* Loading Bar Animasi */
        .glow-line {
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff3344, transparent);
            box-shadow: 0 0 12px #ff3344;
            margin: 25px auto 0;
            animation: extendLine 2.3s forwards ease-in-out;
        }

        /* Class Modifier untuk Trigger Hide */
        .splash-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Keyframes Animasi Intro */
        @keyframes pulseGlow {
            0%, 100% { text-shadow: 0 0 15px rgba(255, 51, 68, 0.5); transform: scale(1); }
            50% { text-shadow: 0 0 35px rgba(255, 51, 68, 0.9); transform: scale(1.03); }
        }

        @keyframes extendLine {
            to { width: 85%; }
        }

        /* ============================================================
         * GLOBAL MAROON DARK MODE THEME DESIGN
         * ============================================================ */
        body {
            background-color: #0b0203 !important; /* Hitam Pekat Khas Cyberpunk */
            color: #f5f5f5 !important;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        hr {
            border-top: 1px solid rgba(255, 51, 68, 0.3);
        }

        /* Mengubah Warna Bootstrap Navbar Menjadi Transparan Maroon */
        .navbar {
            background-color: #1f0609 !important; 
            border-bottom: 2px solid #ff3344;
            box-shadow: 0 4px 15px rgba(255, 51, 68, 0.2);
        }
        
        .navbar-brand {
            color: #ff3344 !important;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 51, 68, 0.5);
        }

        /* Mengubah Seluruh Card/Box Informasi Menjadi Estetik Maroon */
        .card {
            background-color: #160406 !important;
            border: 1px solid rgba(255, 51, 68, 0.4) !important;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 51, 68, 0.25) !important;
            border-color: #ff3344 !important;
        }

        .card-header {
            background-color: #22070a !important;
            border-bottom: 1px solid rgba(255, 51, 68, 0.3) !important;
            color: #ff99aa !important;
            font-weight: 600;
        }

        /* Mengubah List Group Data Terkini */
        .list-group-item {
            background-color: #160406 !important;
            border-bottom: 1px solid rgba(255, 51, 68, 0.15) !important;
            color: #e0e0e0 !important;
        }

        .text-muted {
            color: #a0888b !important;
        }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-content">
        <h1 class="splash-title">Selamat Datang di Apuh City</h1>
        <div class="splash-subtitle">Sistem Monitoring & Analitik Smart City</div>
        <div class="glow-line"></div>
    </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🤖 Apuh City</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/reports/">Reports</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-3">
{% if messages %}
  {% for message in messages %}
    <div class="alert alert-danger alert-dismissible fade show" style="background-color: #2d0b10; color: #ff99aa; border: 1px solid #ff3344;">
      {{ message }}
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
{% endif %}
</div>

{% block content %}
{% endblock %}


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_js %}
{% endblock %}

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Efek splash screen berjalan selama 2.5 detik sebelum memudar
        setTimeout(function() {
            const splash = document.getElementById('splash-screen');
            if (splash) {
                splash.classList.add('splash-hidden');
            }
        }, 2500);
    });
</script>

</body>
</html>
