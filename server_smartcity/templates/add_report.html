{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCity_Apuh - Tambah Laporan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f8f9fa;
            background: radial-gradient(circle at top left, #4a1217 0%, #2d0b0e 38%, #1a0305 100%);
            min-height: 100vh;
        }
        .card-form {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        .form-control, .form-select {
            background-color: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: #fff !important;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: #ff8a95 !important;
            box-shadow: 0 0 0 0.25rem rgba(230, 57, 70, 0.25) !important;
        }
        .btn-maroon {
            background: #6b1d24;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }
        .btn-maroon:hover {
            background: #8b262e;
            color: #fff;
            transform: translateY(-1px);
        }
        .text-maroon-light {
            color: #ff8a95;
        }
    </style>
</head>
<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <a href="/dashboard/" class="btn btn-sm btn-outline-light rounded-pill mb-4 px-3">
                    <i class="fa-solid fa-arrow-left me-2"></i>Kembali ke Dashboard
                </a>

                <div class="card card-form p-4 p-sm-5">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-triangle-exclamation fa-3x text-maroon-light mb-3"></i>
                        <h2 class="fw-bold m-0">Buat Laporan Baru</h2>
                        <p class="text-muted small mt-1">Laporkan masalah fasilitas atau kejadian di kotamu secara real-time.</p>
                    </div>

                    <form method="POST" action="">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="title" class="form-label small fw-bold text-maroon-light">Judul Masalah / Kejadian</label>
                            <input type="text" class="form-control" id="title" name="title" placeholder="Contoh: Jalan Berlubang Parah" required>
                        </div>

                        <div class="mb-3">
                            <label for="location" class="form-label small fw-bold text-maroon-light">Lokasi Spesifik (Alamat/Jalan)</label>
                            <input type="text" class="form-control" id="location" name="location" placeholder="Contoh: Jl. Sukarno Hatta No. 12" required>
                        </div>

                        <div class="mb-3">
                            <label for="category" class="form-label small fw-bold text-maroon-light">Kategori Kerusakan</label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="" disabled selected>-- Pilih Kategori Laporan --</option>
                                <option value="Infrastruktur">Infrastruktur (Jalan/Jembatan)</option>
                                <option value="Fasilitas Umum">Fasilitas Umum (Taman/Halte)</option>
                                <option value="Keamanan">Keamanan & Ketertiban</option>
                                <option value="Sampah & Limbah">Kebersihan & Sampah</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label small fw-bold text-maroon-light">Deskripsi Kronologi Lengkap</label>
                            <textarea class="form-control" id="description" name="description" rows="4" placeholder="Tulis rincian kendala secara jelas di sini..." required></textarea>
                        </div>

                        <button type="submit" class="btn btn-maroon w-100 py-2.5 rounded-pill fw-bold shadow-sm">
                            <i class="fa-solid fa-paper-plane me-2"></i>Kirim Laporan Resmi
                        </button>
                    </form>

                </div>
                
                <p class="text-center text-muted small mt-4">© 2026 SmartCity_Apuh Core System.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
