<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCity_Apuh - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Inter, sans-serif;
            background:
                radial-gradient(circle at top, rgba(143, 31, 46, 0.16), transparent 18%),
                linear-gradient(135deg, #2c060a, #110305);
            min-height: 100vh;
            color: #f7eef0;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            border-radius: 1.4rem;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
        }
        .form-control {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 0.8rem;
            padding: 0.8rem 0.95rem;
        }
        .form-control:focus {
            color: #fff;
            background: rgba(0, 0, 0, 0.3);
            border-color: #d86b79;
            box-shadow: 0 0 0 0.25rem rgba(216, 107, 121, 0.2);
        }
        .btn-maroon {
            background: linear-gradient(90deg, #8f1f2e, #b83d4d);
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 0.8rem 1rem;
        }
        .btn-maroon:hover {
            color: #fff;
            filter: brightness(1.05);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card p-4 p-sm-5">
                    <div class="text-center mb-4">
                        <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 64px; height: 64px; background: rgba(143,31,46,.15);">
                            <i class="fa-solid fa-user-lock fa-2x text-white-50"></i>
                        </div>
                        <h2 class="fw-bold mb-1">Masuk</h2>
                        <p class="text-white-50 small mb-0">SmartCity_Apuh Dashboard</p>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} rounded-3 mb-3">{{ message }}</div>
                        {% endfor %}
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_username" class="form-label small text-white-50">Username</label>
                            <input type="text" name="username" id="id_username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="id_password" class="form-label small text-white-50">Password</label>
                            <input type="password" name="password" id="id_password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-maroon w-100 mt-2">Masuk</button>
                    </form>

                    <p class="text-center text-white-50 small mt-3 mb-0">
                        Belum punya akun?
                        <a href="{% url 'register' %}" class="text-white text-decoration-none fw-semibold">Daftar</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
