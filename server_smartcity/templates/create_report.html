{% extends 'base.html' %}

{% block content %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{% url 'dashboard:dashboard' %}">Dashboard</a></li>
    <li class="breadcrumb-item active">Tambah Laporan</li>
  </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Tambah Laporan Baru</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_title" class="form-label">Judul Laporan</label>
                        <input type="text" name="title" id="id_title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_category" class="form-label">Kategori</label>
                        <input type="text" name="category" id="id_category" class="form-control" placeholder="Contoh: Jalan, Sampah, Lampu">
                    </div>
                    <div class="mb-3">
                        <label for="id_location" class="form-label">Lokasi</label>
                        <input type="text" name="location" id="id_location" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_description" class="form-label">Deskripsi</label>
                        <textarea name="description" id="id_description" class="form-control" rows="4"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Simpan</button>
                        <a href="{% url 'dashboard:dashboard' %}" class="btn btn-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
